{% extends 'personas/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Ciudades</h2>
    <a href="{% url 'crear_ciudad' %}" class="btn btn-primary mb-3">+ Nueva Ciudad</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for ciudad in ciudades %}
            <tr>
                <td>{{ ciudad.id }}</td>
                <td>{{ ciudad.nombre }}</td>
                <td>
                    <a href="{% url 'editar_ciudad' ciudad.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'eliminar_ciudad' ciudad.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No hay ciudades registradas.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
