{% extends 'personas/base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <h2 class="mb-4">{% if persona %} Editar Persona{% else %} Nueva Persona{% endif %}</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Documento</label>
            <input type="number" name="documento" class="form-control"
              value="{{ persona.documento|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control"
              value="{{ persona.nombre|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control"
              value="{{ persona.apellido|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" class="form-control"
              value="{{ persona.direccion|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" name="correo" class="form-control"
              value="{{ persona.correo|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Ciudad</label>
            <select name="ciudad" class="form-control" required>
              {% for ciudad in ciudades %}
              <option value="{{ ciudad.id }}"
                {% if persona.ciudad.id == ciudad.id %}selected{% endif %}>
                {{ ciudad.nombre }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success w-100"> Guardar</button>
            <a href="{% url 'lista_personas' %}" class="btn btn-secondary w-100">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
