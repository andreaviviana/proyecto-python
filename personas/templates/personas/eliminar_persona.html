{% extends 'personas/base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm border-danger">
      <div class="card-body">
        <h3 class="text-danger"> ¿Eliminar persona?</h3>
        <p class="fs-5">¿Estás seguro de que deseas eliminar a <strong>{{ persona }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
          <a href="{% url 'lista_personas' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
