{% extends 'personas/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>{% if ciudad %}Editar{% else %}Nueva{% endif %} Ciudad</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ ciudad.nombre }}" required>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'lista_ciudades' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
